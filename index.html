<html>
    <head>
        <meta charset="UTF-8" width=device-width initial-scale=1.0, user-scalable=no>
        <title>트리플에스 소트</title>
        <script src="./index.js" charset="UTF-8"></script>
    </head>
    <body>
        <main>
            <header>
                <div>
                    <p>트리플에스 소트</p>
                    <p>tripleS Sort</p>
                    <p style="font-size: 16px;font-weight: normal;">더 선호하는 멤버를 선택하세요.</p>
                    <p style="font-size: 16px;font-weight: normal;">Choose your better one.</p>
                </div>
            </header>
            <article>
                <button onclick="run()"><p>시작</p><p>START</p></button>
            </article>
            <footer>
            </footer>
        </main>
    </body>
    <style>
        @media (orientation: portrait) {
            main {
                width: 100vh;
                height: 100vh;
            }
        }
        body {
            margin: 0;
            text-align: center;
        }
        header {
            height: 20vh;
            font-size: 25px;
            font-weight: bold;
        }
        header,article,footer {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        article {
            height: 70vh;
        }
        footer {
            height: 10vh;
            flex-wrap: wrap;
        }
        button {
            width: 12.75vh;
            height: 9.18vh;
            background-color: #000;
            color: #fff;
            font-weight: bold;
            border: 3px solid #000;
            border-radius: 10%;
            cursor: pointer;
            margin: 5%;
        }
        button:hover {
            background-color: #6e2cff;
        }
        p {
            margin: 0;
        }
        th,td {
            border: 1px solid #000;
            padding: 4px 7px;
        }
        table {
            border-collapse: collapse;
            margin: auto;
            text-align: center;
        }
    </style>
</html>
